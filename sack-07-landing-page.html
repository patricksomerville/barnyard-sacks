<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soon — Join the Waitlist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      text-align: center;
    }

    .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #666;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 64px;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.03em;
    }

    p {
      font-size: 20px;
      color: #999;
      margin-bottom: 48px;
      line-height: 1.5;
    }

    .waitlist-form {
      display: flex;
      gap: 12px;
      max-width: 400px;
      margin: 0 auto;
    }

    input[type="email"] {
      flex: 1;
      padding: 16px 20px;
      border: 1px solid #333;
      background: transparent;
      color: #fff;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus {
      border-color: #fff;
    }

    button {
      padding: 16px 32px;
      background: #fff;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.02);
    }

    .social-proof {
      margin-top: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 14px;
      color: #666;
    }

    .avatars {
      display: flex;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
      border: 2px solid #0a0a0a;
      margin-left: -8px;
    }

    .avatar:first-child {
      margin-left: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Coming Soon</div>
    <h1>The thing you need.</h1>
    <p>We're building something new. Be the first to know when it's ready.</p>
    
    <form class="waitlist-form">
      <input type="email" placeholder="you@example.com" required>
      <button type="submit">Join Waitlist</button>
    </form>
    
    <div class="social-proof">
      <div class="avatars">
        <div class="avatar"></div>
        <div class="avatar"></div>
        <div class="avatar"></div>
      </div>
      <span>Join 2,000+ others on the waitlist</span>
    </div>
  </div>
</body>
</html>

<!-- Big Sack Deliverable:
     - Complete waitlist landing page
     - Responsive, dark mode, modern aesthetic
     - Email capture form
     - Social proof section
     - No external dependencies
     - Ready to deploy anywhere
