<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barnyard.io | Buy a Sack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #040404;
            --fg: #f4f0e8;
            --muted: #a19b92;
            --line: rgba(244, 240, 232, 0.12);
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: Georgia, "Times New Roman", serif;
        }

        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: min(100%, 72rem);
            padding: 2rem 1.5rem 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            text-align: center;
        }

        .world-clocks {
            width: min(100%, 34rem);
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1.1rem 1.4rem;
            align-items: start;
            justify-items: center;
        }

        .clock-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.65rem;
        }

        .clock-face {
            position: relative;
            width: clamp(4.75rem, 8vw, 6.5rem);
            aspect-ratio: 1;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .clock-face::before {
            content: "";
            position: absolute;
            inset: 0.55rem;
            border-radius: 999px;
            border: 1px solid rgba(244, 240, 232, 0.05);
        }

        .tick {
            position: absolute;
            left: 50%;
            top: 0.45rem;
            width: 1px;
            height: 0.45rem;
            background: rgba(244, 240, 232, 0.22);
            transform-origin: center calc(100% + 2.35rem);
        }

        .hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform-origin: center bottom;
            border-radius: 999px;
        }

        .hand.hour {
            width: 0.18rem;
            height: 1.4rem;
            margin-left: -0.09rem;
            background: rgba(244, 240, 232, 0.9);
        }

        .hand.minute {
            width: 0.12rem;
            height: 2rem;
            margin-left: -0.06rem;
            background: rgba(244, 240, 232, 0.76);
        }

        .hand.second {
            width: 0.06rem;
            height: 2.25rem;
            margin-left: -0.03rem;
            background: #f4f0e8;
        }

        .pin {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 0.34rem;
            height: 0.34rem;
            margin-left: -0.17rem;
            margin-top: -0.17rem;
            border-radius: 999px;
            background: #f4f0e8;
        }

        .clock-label {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .words {
            max-width: 12ch;
            font-size: clamp(3.3rem, 10vw, 8.5rem);
            letter-spacing: -0.06em;
            line-height: 0.88;
            text-transform: lowercase;
            min-height: 1.76em;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-wrap: balance;
        }

        .word-line {
            display: block;
            min-height: 0.88em;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 11rem;
            padding: 0.95rem 1.4rem;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #f4f0e8;
            color: #040404;
            text-decoration: none;
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 0.98rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: transform 0.18s ease, opacity 0.18s ease;
            align-self: center;
        }

        .cta:hover {
            transform: scale(1.03);
            opacity: 0.92;
        }

        @media (max-width: 900px) {
            .world-clocks {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 1.1rem 0.85rem;
            }
        }

        @media (max-width: 560px) {
            .world-clocks {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .words {
                font-size: clamp(2.8rem, 14vw, 5.6rem);
            }
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <main class="wrap">
        <section class="world-clocks" aria-label="World clocks">
            <div class="clock-card">
                <div class="clock-face" data-zone="UTC">
                    <span class="tick" style="transform: translateX(-50%) rotate(0deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(30deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(60deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(90deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(120deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(150deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(180deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(210deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(240deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(270deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(300deg);"></span>
                    <span class="tick" style="transform: translateX(-50%) rotate(330deg);"></span>
                    <span class="hand hour"></span>
                    <span class="hand minute"></span>
                    <span class="hand second"></span>
                    <span class="pin"></span>
                </div>
                <div class="clock-label">UTC</div>
            </div>
            <div class="clock-card">
                <div class="clock-face" data-zone="America/Los_Angeles">
                    <span class="tick" style="transform: translateX(-50%) rotate(0deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(30deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(60deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(90deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(120deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(150deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(180deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(210deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(240deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(270deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(300deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(330deg);"></span>
                    <span class="hand hour"></span><span class="hand minute"></span><span class="hand second"></span><span class="pin"></span>
                </div>
                <div class="clock-label">Los Angeles</div>
            </div>
            <div class="clock-card">
                <div class="clock-face" data-zone="America/New_York">
                    <span class="tick" style="transform: translateX(-50%) rotate(0deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(30deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(60deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(90deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(120deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(150deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(180deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(210deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(240deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(270deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(300deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(330deg);"></span>
                    <span class="hand hour"></span><span class="hand minute"></span><span class="hand second"></span><span class="pin"></span>
                </div>
                <div class="clock-label">New York</div>
            </div>
            <div class="clock-card">
                <div class="clock-face" data-zone="Europe/London">
                    <span class="tick" style="transform: translateX(-50%) rotate(0deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(30deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(60deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(90deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(120deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(150deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(180deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(210deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(240deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(270deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(300deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(330deg);"></span>
                    <span class="hand hour"></span><span class="hand minute"></span><span class="hand second"></span><span class="pin"></span>
                </div>
                <div class="clock-label">London</div>
            </div>
            <div class="clock-card">
                <div class="clock-face" data-zone="Asia/Tokyo">
                    <span class="tick" style="transform: translateX(-50%) rotate(0deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(30deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(60deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(90deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(120deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(150deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(180deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(210deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(240deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(270deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(300deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(330deg);"></span>
                    <span class="hand hour"></span><span class="hand minute"></span><span class="hand second"></span><span class="pin"></span>
                </div>
                <div class="clock-label">Tokyo</div>
            </div>
            <div class="clock-card">
                <div class="clock-face" data-zone="Australia/Sydney">
                    <span class="tick" style="transform: translateX(-50%) rotate(0deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(30deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(60deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(90deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(120deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(150deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(180deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(210deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(240deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(270deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(300deg);"></span><span class="tick" style="transform: translateX(-50%) rotate(330deg);"></span>
                    <span class="hand hour"></span><span class="hand minute"></span><span class="hand second"></span><span class="pin"></span>
                </div>
                <div class="clock-label">Sydney</div>
            </div>
        </section>

        <div class="words" aria-live="polite">
            <span class="word-line" id="word-line-1"></span>
            <span class="word-line" id="word-line-2"></span>
        </div>
        <a href="#" class="cta">Buy a Sack — $1</a>
    </main>

    <script>
        const ADJECTIVES = [
            'cerulean', 'hidden', 'broken', 'velvet', 'flickering', 'radiant',
            'thawing', 'luminous', 'bronze', 'melancholy', 'scarlet', 'drifting',
            'ancient', 'jubilant', 'frozen', 'cryptic', 'silent', 'burnished'
        ];

        const NOUNS = [
            'mandolin', 'lighthouse', 'paradox', 'terrace', 'lantern', 'chronometer',
            'pavilion', 'mirror', 'telescope', 'meadow', 'cathedral', 'quilt',
            'hourglass', 'windmill', 'river', 'harmonica', 'observatory', 'barn'
        ];

        function getPhrase(timestamp) {
            const seconds = Math.floor(timestamp / 1000);
            const adjective = ADJECTIVES[Math.abs((seconds * 31 + 17) % ADJECTIVES.length)];
            const noun = NOUNS[Math.abs((seconds * 17 + 31) % NOUNS.length)];
            return { adjective, noun };
        }

        function getZonedParts(zone) {
            const formatter = new Intl.DateTimeFormat('en-GB', {
                timeZone: zone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hourCycle: 'h23'
            });

            const parts = formatter.formatToParts(new Date());
            const pick = (type) => Number(parts.find((part) => part.type === type).value);
            return {
                hours: pick('hour'),
                minutes: pick('minute'),
                seconds: pick('second')
            };
        }

        function updateWorldClocks() {
            document.querySelectorAll('.clock-face').forEach((clock) => {
                const zone = clock.dataset.zone;
                const { hours, minutes, seconds } = getZonedParts(zone);
                const hourDeg = ((hours % 12) + minutes / 60 + seconds / 3600) * 30;
                const minuteDeg = (minutes + seconds / 60) * 6;
                const secondDeg = seconds * 6;

                clock.querySelector('.hand.hour').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
                clock.querySelector('.hand.minute').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
                clock.querySelector('.hand.second').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
            });
        }

        function updateClock() {
            const now = new Date();
            const phraseSeconds = Math.floor(now.getTime() / 1000);
            const cycleStep = phraseSeconds % 3;
            const cycleBaseSeconds = phraseSeconds - cycleStep;
            const phrase = getPhrase(cycleBaseSeconds * 1000);

            const line1 = document.getElementById('word-line-1');
            const line2 = document.getElementById('word-line-2');

            if (cycleStep === 0) {
                line1.textContent = '';
                line2.textContent = '';
            } else if (cycleStep === 1) {
                line1.textContent = phrase.adjective;
                line2.textContent = '';
            } else {
                line1.textContent = phrase.adjective;
                line2.textContent = phrase.noun;
            }

            updateWorldClocks();
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
