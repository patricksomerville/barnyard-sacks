<!-- Sack ($15) — Page Section: Asymmetric Hero -->
<!-- A hero section with offset image and type -->

<section style="
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
  padding: 120px 40px;
  font-family: system-ui, sans-serif;
">
  <div style="position: relative;">
    <h1 style="
      font-size: 72px;
      font-weight: 400;
      line-height: 0.9;
      margin: 0 0 24px 0;
      letter-spacing: -0.02em;
    ">
      Make<br>something<br>weird.
    </h1>
    <p style="
      font-size: 18px;
      color: #666;
      margin: 0 0 32px 0;
      max-width: 400px;
    ">
      A hero section that doesn't look like every other hero section.
    </p>
    <button style="
      background: #1a1a1a;
      color: white;
      padding: 16px 32px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    ">
      Do the thing →
    </button>
  </div>
  
  <div style="
    background: #f5f5f5;
    aspect-ratio: 4/5;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
  ">
    [Image placeholder — offset by 40px in actual implementation]
  </div>
</section>

<!-- Features:
     - Asymmetric grid (not 50/50)
     - Tight line-height on headline
     - Generous whitespace
     - System font stack (no Google Fonts needed)
-->
